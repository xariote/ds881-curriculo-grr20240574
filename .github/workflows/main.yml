# ============================================================
#  .github/workflows/main.yml
#  Pipeline CI/CD — Lint → Build → Deploy (GitHub Pages)
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissões necessárias para o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Lint / Static Analysis
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências de lint
        run: npm install -g htmlhint stylelint stylelint-config-standard

      - name: Criar config HTMLHint
        run: |
          cat > .htmlhintrc << 'EOF'
          {
            "tagname-lowercase": true,
            "attr-lowercase": true,
            "attr-value-double-quotes": true,
            "doctype-first": true,
            "tag-pair": true,
            "spec-char-escape": false,
            "id-unique": true,
            "src-not-empty": true,
            "attr-no-duplication": true,
            "title-require": true
          }
          EOF

      - name: Criar config Stylelint
        run: |
          cat > .stylelintrc.json << 'EOF'
          {
            "extends": ["stylelint-config-standard"],
            "rules": {
              "color-no-invalid-hex": true,
              "no-duplicate-selectors": true,
              "declaration-block-no-duplicate-properties": true,
              "no-empty-source": true,
              "comment-no-empty": true,
              "font-family-no-duplicate-names": true
            }
          }
          EOF

      - name: Lint HTML
        run: htmlhint "src/**/*.html"

      - name: Lint CSS
        run: stylelint "src/**/*.css" || true

      - name: Verificar estrutura de arquivos obrigatórios
        run: |
          echo "📁 Verificando estrutura do projeto..."
          test -f src/index.html   && echo "✅ index.html encontrado"     || (echo "❌ index.html ausente" && exit 1)
          test -f src/css/style.css && echo "✅ style.css encontrado"     || (echo "❌ style.css ausente" && exit 1)
          test -f src/js/main.js   && echo "✅ main.js encontrado"        || (echo "❌ main.js ausente" && exit 1)
          test -f Dockerfile       && echo "✅ Dockerfile encontrado"     || (echo "❌ Dockerfile ausente" && exit 1)
          test -f docker-compose.yml && echo "✅ docker-compose encontrado" || (echo "❌ docker-compose ausente" && exit 1)
          echo "✅ Estrutura de arquivos OK"

  # ──────────────────────────────────────────────
  # JOB 2: Build
  # ──────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Validar HTML com tidy
        run: |
          sudo apt-get install -y tidy 2>/dev/null || true
          tidy -errors -quiet -utf8 src/index.html && echo "✅ HTML válido" || echo "⚠️  Avisos de HTML (não bloqueante)"

      - name: Build Docker image
        run: |
          echo "🐳 Construindo imagem Docker..."
          docker build -t portfolio-dev:ci .
          echo "✅ Imagem Docker construída com sucesso"

      - name: Teste smoke do container
        run: |
          echo "🧪 Iniciando container para smoke test..."
          docker run -d --name portfolio-test -p 8080:8080 portfolio-dev:ci
          sleep 5
          curl -f http://localhost:8080 -o /dev/null -s && echo "✅ Site respondendo em localhost:8080" || (echo "❌ Site não respondeu" && exit 1)
          docker stop portfolio-test && docker rm portfolio-test

      - name: Preparar artefato de deploy
        run: |
          echo "📦 Preparando pasta de deploy..."
          mkdir -p ./dist
          cp -r src/. ./dist/
          echo "✅ Artefato preparado em ./dist"

      - name: Upload artefato para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ──────────────────────────────────────────────
  # JOB 3: Deploy (apenas na main)
  # ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy → GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    # Só executa em push na main (não em PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Resultado do deploy
        run: |
          echo "🎉 Deploy concluído!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
